map $sent_http_content_type $security_csp {
    default "default-src 'self'; script-src 'self' 'sha256-W8PafKzJ1klY6wCO/CXnaqVWLNUXJG0L0orFwaoNUWM='; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'";
}

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Note: nginx only inherits add_header from an outer block if the inner block
    # has no add_header of its own. Each location that sets any add_header must
    # repeat the security headers, so they're grouped here for reuse.
    # The sha256 in the CSP covers the inline theme-bootstrap script in index.html;
    # if that script is edited, regenerate the hash.
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Frame-Options "DENY" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy $security_csp always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header X-Frame-Options "DENY" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy $security_csp always;
    }

    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 10M;
    }
}
